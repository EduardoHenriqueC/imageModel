<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Eduardo Henrique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, #1a1a3e 0%, #0f0f1a 100%);
      border-bottom: 1px solid #2a2a5a;
      padding: 2rem 0 1.5rem;
    }
    .hero h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #7c6af5, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: #888aaa;
      font-size: 0.9rem;
      margin: 0;
    }
    .card-main {
      background: #16162a;
      border: 1px solid #2a2a5a;
      border-radius: 1.25rem;
    }
    .webcam-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a18;
      border-radius: 1rem;
      border: 2px solid #2a2a5a;
      min-height: 220px;
      overflow: hidden;
      position: relative;
    }
    .webcam-wrapper canvas {
      border-radius: 0.75rem;
      max-width: 100%;
    }
    .webcam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #555580;
      padding: 2rem;
    }
    .webcam-placeholder svg {
      opacity: 0.4;
    }
    .btn-start {
      background: linear-gradient(135deg, #6c56f5, #a78bfa);
      border: none;
      border-radius: 2rem;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 24px rgba(108, 86, 245, 0.35);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 86, 245, 0.5);
      background: linear-gradient(135deg, #7c6af5, #c4b5fd);
      color: #fff;
    }
    .btn-start:active {
      transform: scale(0.97);
    }
    .btn-start:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .btn-start svg {
      width: 20px;
      height: 20px;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7c6af5;
      margin-bottom: 0.75rem;
    }
    .label-item {
      margin-bottom: 1rem;
    }
    .label-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
    }
    .label-name span:first-child {
      font-size: 0.85rem;
      font-weight: 500;
      color: #c0c0e0;
    }
    .label-pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: #a78bfa;
      min-width: 42px;
      text-align: right;
    }
    .progress {
      height: 8px;
      background: #1e1e3a;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      border-radius: 99px;
      background: linear-gradient(90deg, #6c56f5, #a78bfa);
      transition: width 0.25s ease;
    }
    .progress-bar.high {
      background: linear-gradient(90deg, #22d3a0, #6ee7b7);
    }
    .progress-bar.mid {
      background: linear-gradient(90deg, #f59e0b, #fcd34d);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      padding: 0.3rem 0.85rem;
      border-radius: 99px;
      font-weight: 500;
    }
    .status-idle {
      background: #1e1e3a;
      color: #666688;
    }
    .status-active {
      background: #0d2a1e;
      color: #22d3a0;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-dot.pulse {
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .divider {
      border-color: #2a2a5a;
    }
    @media (max-width: 576px) {
      .hero h1 { font-size: 1.4rem; }
      .btn-start { padding: 0.65rem 1.75rem; font-size: 0.92rem; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
          <h1 class="mb-1">Eduardo Henrique</h1>
          <p>Reconhecimento de imagem com Teachable Machine</p>
        </div>
        <span class="status-badge status-idle" id="status-badge">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Câmera inativa</span>
        </span>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row g-4 justify-content-center">

      <div class="col-12 col-lg-5">
        <div class="card-main p-3 h-100 d-flex flex-column gap-3">
          <div class="webcam-wrapper" id="webcam-container">
            <div class="webcam-placeholder" id="webcam-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M4 8a2 2 0 00-2 2v4a2 2 0 002 2h8a2 2 0 002-2v-4a2 2 0 00-2-2H4z"/>
              </svg>
              <span style="font-size:0.85rem;">Aguardando câmera...</span>
            </div>
          </div>

          <div class="text-center">
            <button class="btn-start" id="btn-start" onclick="init()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M4 8a2 2 0 00-2 2v4a2 2 0 002 2h8a2 2 0 002-2v-4a2 2 0 00-2-2H4z"/>
              </svg>
              Ativar Câmera
            </button>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="card-main p-3 h-100">
          <div class="section-title">Resultado da análise</div>
          <hr class="divider mt-0 mb-3"/>
          <div id="label-container">
            <div class="d-flex align-items-center justify-content-center" style="min-height:140px; color:#444466; font-size:0.85rem; flex-direction:column; gap:0.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" style="opacity:0.3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
              </svg>
              Inicie a câmera para ver as predições
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/12-6ZF3gqb/";
    let model, webcam, labelContainer, maxPredictions;
    let initialized = false;

    async function init() {
      if (initialized) return;
      const btn = document.getElementById("btn-start");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status"></span> Carregando...`;

      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const container = document.getElementById("webcam-container");
        document.getElementById("webcam-placeholder").remove();
        container.appendChild(webcam.canvas);
        webcam.canvas.style.borderRadius = "0.75rem";
        webcam.canvas.style.maxWidth = "100%";

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement("div");
          item.className = "label-item";
          item.innerHTML = `
            <div class="label-name">
              <span class="label-classname">Classe ${i + 1}</span>
              <span class="label-pct">0%</span>
            </div>
            <div class="progress">
              <div class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>`;
          labelContainer.appendChild(item);
        }

        const badge = document.getElementById("status-badge");
        badge.className = "status-badge status-active";
        document.getElementById("status-dot").className = "status-dot pulse";
        document.getElementById("status-text").textContent = "Câmera ativa";

        btn.style.display = "none";
        initialized = true;

      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M4 8a2 2 0 00-2 2v4a2 2 0 002 2h8a2 2 0 002-2v-4a2 2 0 00-2-2H4z"/></svg> Ativar Câmera`;
        console.error(e);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      const items = labelContainer.querySelectorAll(".label-item");

      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct = Math.round(prob * 100);
        const className = prediction[i].className;

        const item = items[i];
        item.querySelector(".label-classname").textContent = className;
        item.querySelector(".label-pct").textContent = pct + "%";

        const bar = item.querySelector(".progress-bar");
        bar.style.width = pct + "%";
        bar.className = "progress-bar";
        if (pct >= 70) bar.classList.add("high");
        else if (pct >= 40) bar.classList.add("mid");
      }
    }
  </script>
</body>
</html>
